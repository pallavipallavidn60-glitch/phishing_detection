<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Detection System</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#0f172a,#1e293b);
            color:white;
        }

        .container{
            width:90%;
            max-width:500px;
            padding:30px;
            border-radius:20px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            box-shadow:0 0 20px rgba(0,0,0,0.4);
            text-align:center;
        }

        h1{
            margin-bottom:20px;
            color:#38bdf8;
        }

        p{
            margin-bottom:15px;
            color:#cbd5e1;
        }

        input{
            width:100%;
            padding:14px;
            border:none;
            outline:none;
            border-radius:10px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:14px;
            margin-top:20px;
            border:none;
            border-radius:10px;
            background:#38bdf8;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#0284c7;
        }

        .result{
            margin-top:20px;
            padding:15px;
            border-radius:10px;
            display:none;
            font-size:18px;
            font-weight:bold;
        }

        .safe{
            background:rgba(34,197,94,0.2);
            color:#4ade80;
        }

        .danger{
            background:rgba(239,68,68,0.2);
            color:#f87171;
        }

    </style>
</head>
<body>

    <div class="container">

        <h1>Phishing Detection System</h1>

        <p>Enter Website URL</p>

        <input 
            type="text" 
            id="urlInput" 
            placeholder="https://example.com"
        >

        <button onclick="checkURL()">
            Check URL
        </button>

        <div id="result" class="result"></div>

    </div>

<script>

async function checkURL(){

    const url = document.getElementById("urlInput").value;

    if(url.trim() === ""){
        alert("Please enter a URL");
        return;
    }

    try{

        const response = await fetch("/check", {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                url:url
            })
        });

        const data = await response.json();

        const resultDiv = document.getElementById("result");

        resultDiv.style.display = "block";

        if(data.status === "safe"){

            resultDiv.className = "result safe";

            resultDiv.innerHTML = "✅ Safe Website";

        }else{

            resultDiv.className = "result danger";

            resultDiv.innerHTML = "⚠️ Phishing Website Detected";
        }

    }catch(error){

        const resultDiv = document.getElementById("result");

        resultDiv.style.display = "block";

        resultDiv.className = "result danger";

        resultDiv.innerHTML = "❌ Backend Server Not Running";
    }
}

</script>

</body>
</html>
